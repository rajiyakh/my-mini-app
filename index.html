<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Farcaster Mini App</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --border: #2a2a3a;
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
      --green: #34d399;
      --text: #f0f0ff;
      --muted: #6b6b88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(139,92,246,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .app {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      text-align: center;
      padding: 32px 0 8px;
    }
    .logo {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* User card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--green));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .user-info h2 {
      font-size: 17px;
      font-weight: 700;
    }
    .user-info span {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .fid-badge {
      margin-left: auto;
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 8px;
      padding: 4px 10px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--purple-light);
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* Actions */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(139,92,246,0.35);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--purple);
      background: rgba(139,92,246,0.08);
    }

    /* Counter section */
    .counter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .counter-display {
      font-size: 64px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--purple-light), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin: 12px 0;
    }
    .counter-btns {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .counter-btns .btn {
      flex: 1;
    }

    /* Status */
    .status {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-align: center;
      color: var(--muted);
      padding: 8px 0 4px;
    }
    .status .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <div class="loading">
    <div class="spinner"></div>
    Loading Mini App...
  </div>
</div>

<script type="module">
  import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';

  let counter = 0;
  let userContext = null;

  async function init() {
    try {
      // Get Farcaster context
      const ctx = await sdk.context;
      userContext = ctx?.user || null;
    } catch (e) {
      console.log('Running outside Farcaster (preview mode)');
    }

    // Tell Farcaster: app is ready (hides splash screen)
    await sdk.actions.ready();

    // Render the UI
    render();
  }

  function render() {
    const user = userContext;
    const displayName = user?.displayName || 'Farcaster User';
    const username = user?.username || 'unknown';
    const fid = user?.fid || '—';
    const pfpUrl = user?.pfpUrl || '';
    const followerCount = user?.followerCount ?? '—';
    const followingCount = user?.followingCount ?? '—';

    document.getElementById('app').innerHTML = `
      <div class="header">
        <div class="logo">🟣</div>
        <h1>My Mini App</h1>
        <p>Powered by Farcaster</p>
      </div>

      <!-- User card -->
      <div class="card">
        <div class="card-label">👤 Signed in as</div>
        <div class="user-row">
          <div class="avatar">
            ${pfpUrl
              ? `<img src="${pfpUrl}" alt="pfp" />`
              : displayName.charAt(0).toUpperCase()}
          </div>
          <div class="user-info">
            <h2>${displayName}</h2>
            <span>@${username}</span>
          </div>
          <div class="fid-badge">FID ${fid}</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-value">${followerCount}</div>
          <div class="stat-label">Followers</div>
        </div>
        <div class="stat">
          <div class="stat-value">${followingCount}</div>
          <div class="stat-label">Following</div>
        </div>
      </div>

      <!-- Counter -->
      <div class="counter-card">
        <div class="card-label">🎯 Tap Counter</div>
        <div class="counter-display" id="count">0</div>
        <div class="counter-btns">
          <button class="btn btn-secondary" onclick="changeCount(-1)">− Minus</button>
          <button class="btn btn-primary" onclick="changeCount(1)">+ Tap!</button>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="btn btn-primary" onclick="castShare()">
          📣 Share on Farcaster
        </button>
        <button class="btn btn-secondary" onclick="openProfile()">
          🔗 View My Profile
        </button>
      </div>

      <div class="status">
        <span class="dot"></span>
        Connected to Farcaster
      </div>
    `;
  }

  // Global functions for button onclick
  window.changeCount = function(delta) {
    counter = Math.max(0, counter + delta);
    const el = document.getElementById('count');
    if (el) {
      el.textContent = counter;
      el.style.transform = 'scale(1.2)';
      setTimeout(() => el.style.transform = 'scale(1)', 150);
      el.style.transition = 'transform 0.15s ease';
    }
  };

  window.castShare = async function() {
    try {
      await sdk.actions.openUrl(
        `https://warpcast.com/~/compose?text=I+built+my+first+Farcaster+Mini+App+🟣+My+tap+count%3A+${counter}`
      );
    } catch (e) {
      alert('Share: tap count is ' + counter);
    }
  };

  window.openProfile = async function() {
    const username = userContext?.username;
    try {
      if (username) {
        await sdk.actions.viewProfile({ username });
      } else {
        await sdk.actions.openUrl('https://warpcast.com');
      }
    } catch (e) {
      alert('Profile: @' + (username || 'unknown'));
    }
  };

  init();
</script>
</body>
</html>
